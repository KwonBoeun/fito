<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
  <title>FITO - 라이브 만들기</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/group.css') }}"/>
  <style>
    .tp-wrap{display:flex;align-items:center;justify-content:center;gap:8px;padding:16px 0}
    .tp-col{display:flex;flex-direction:column;align-items:center;gap:4px}
    .tp-btn{width:44px;height:32px;border:none;border-radius:8px;background:var(--gray-100);font-size:18px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--gray-500);transition:background .1s}
    .tp-btn:active{background:var(--gray-200)}
    .tp-display{width:60px;height:56px;display:flex;align-items:center;justify-content:center;font-size:32px;font-weight:900;background:var(--gray-50);border-radius:12px;border:2px solid var(--gray-200);cursor:pointer;transition:border-color .15s}
    .tp-display:active{border-color:var(--black)}
    .tp-sep{font-size:32px;font-weight:900;color:var(--gray-300);margin:0 4px;padding-top:24px}
    .tp-label{font-size:10px;color:var(--gray-400);margin-top:2px}
  </style>
</head>
<body>

<header class="gp-header">
  <a href="{{ url_for('group_main', id=group_id) }}" class="gp-back"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg></a>
  <span class="gp-header-title">라이브 만들기</span>
</header>

<div class="gp-content">
  <div class="gl-create-form">
    <div class="gc-field">
      <div class="gc-label">라이브 이름 <span class="gc-label-count"><span id="nameCount">0</span>/50</span></div>
      <input class="gc-input" id="liveName" type="text" placeholder="라이브 이름을 입력하세요" maxlength="50"/>
    </div>
    <div class="gc-field">
      <div class="gc-label">공개 설정</div>
      <div class="gc-toggle-row">
        <button class="gc-toggle-btn selected" id="btnPublic" onclick="setVisibility('public')">공개</button>
        <button class="gc-toggle-btn" id="btnPrivate" onclick="setVisibility('private')">비공개</button>
      </div>
    </div>
    <div class="gc-field">
      <div class="gc-label">라이브 설명</div>
      <textarea class="gc-textarea" id="liveDesc" placeholder="라이브에 대한 설명을 입력하세요" maxlength="400" style="min-height:80px"></textarea>
      <label style="display:flex;align-items:center;gap:6px;margin-top:8px;cursor:pointer">
        <input type="checkbox" id="recCheck" style="width:16px;height:16px;accent-color:#000"/>
        <span style="font-size:12px;color:var(--gray-500)">이 라이브를 녹화합니다</span>
      </label>
    </div>

    <!-- 시간 설정 (버튼 기반) -->
    <div class="gc-field">
      <div class="gc-label">시작 시간</div>
      <div class="tp-wrap">
        <div class="tp-col">
          <button class="tp-btn" onclick="changeHour(-1)">▲</button>
          <div class="tp-display" id="hourDisplay" onclick="editHourDirect()">00</div>
          <button class="tp-btn" onclick="changeHour(1)">▼</button>
          <div class="tp-label">시 (0~23)</div>
        </div>
        <span class="tp-sep">:</span>
        <div class="tp-col">
          <button class="tp-btn" onclick="changeMin(-1)">▲</button>
          <div class="tp-display" id="minDisplay" onclick="editMinDirect()">00</div>
          <button class="tp-btn" onclick="changeMin(1)">▼</button>
          <div class="tp-label">분 (0~59)</div>
        </div>
      </div>
      <div style="text-align:center;margin-top:4px">
        <span style="font-size:14px;font-weight:700" id="selectedTime">00:00</span>
        <span style="font-size:12px;color:var(--gray-400)"> 시작 예정</span>
      </div>
      <div style="text-align:center;font-size:11px;color:var(--gray-400);margin-top:4px">숫자를 클릭하면 직접 입력할 수 있습니다</div>
    </div>

    <div class="gc-field">
      <div class="gc-label">참여 인원 (4~8명)</div>
      <div class="gl-people-row">
        <button class="gl-people-btn" id="pplMinus" onclick="changePeople(-1)">−</button>
        <div class="gl-people-count" id="pplCount">4</div>
        <button class="gl-people-btn" id="pplPlus" onclick="changePeople(1)">+</button>
      </div>
      <div class="gl-people-label">명</div>
    </div>
  </div>
  <div class="gl-confirm-wrap">
    <button class="gc-submit-btn" id="confirmBtn" onclick="confirmLive()">라이브 만들기</button>
  </div>
</div>

<div class="snackbar" id="snackbar"></div>

<!-- Bottom Navigation -->
<nav class="bottom-nav" id="bottom-nav"></nav>
<script src="{{ url_for('static', filename='js/nav.js') }}"></script>

<script>window.URL_GROUP_MAIN = "{{ url_for('group_main', id=group_id) }}";</script>
<script src="{{ url_for('static', filename='js/group_store.js') }}"></script>
<script src="{{ url_for('static', filename='js/group_live_create.js') }}"></script>
</body>
</html>
