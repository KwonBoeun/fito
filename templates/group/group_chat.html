<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
  <title>FITO - 그룹 채팅</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/group.css') }}"/>
</head>
<body>

<header class="gp-header">
  <a href="{{ url_for('group_main', id=group_id) }}" class="gp-back"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg></a>
  <span class="gp-header-title" id="chatTitle">전체 채팅</span>
</header>

<div class="gc-chat-wrap">
  <!-- 6-1-1. 채팅 기록 -->
  <div class="gc-messages" id="messageList"></div>

  <!-- 글자수 표시 -->
  <div class="gc-char-count"><span id="charCount">0</span>/300</div>

  <!-- 하단 입력바 -->
  <div class="gc-input-bar">
    <!-- 6-1-2. 첨부 버튼 -->
    <button class="gc-attach-btn" id="attachBtn" onclick="openAttach()">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
    </button>
    <!-- 6-1-3. 채팅 입력 -->
    <textarea class="gc-text-input" id="chatInput" placeholder="메시지를 입력하세요" rows="1" maxlength="300"></textarea>
    <!-- 6-1-4. 보내기 -->
    <button class="gc-send-btn disabled" id="sendBtn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    </button>
  </div>
</div>

<!-- 첨부 바텀시트 -->
<div class="bottom-sheet-overlay" id="attachOverlay" onclick="closeAttach()"></div>
<div class="bottom-sheet" id="attachSheet">
  <div class="bottom-sheet-handle"></div>
  <div style="font-size:15px;font-weight:700;margin-bottom:12px">파일 첨부</div>
  <div style="display:flex;gap:12px">
    <div style="flex:1;padding:20px;background:var(--gray-50);border-radius:var(--r-md);text-align:center;cursor:pointer" onclick="selectAttachType('image')">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
      <div style="font-size:12px;font-weight:600;margin-top:6px">이미지</div>
      <div style="font-size:10px;color:var(--gray-400)">최대 20장, 300MB</div>
    </div>
    <div style="flex:1;padding:20px;background:var(--gray-50);border-radius:var(--r-md);text-align:center;cursor:pointer" onclick="selectAttachType('video')">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="1.5"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>
      <div style="font-size:12px;font-weight:600;margin-top:6px">동영상</div>
      <div style="font-size:10px;color:var(--gray-400)">최대 20개, 300MB</div>
    </div>
  </div>
</div>

<!-- 부적절 어휘 모달 -->
<div class="modal-wrap" id="badWordModal">
  <div class="modal-box">
    <div class="modal-title">전송 불가</div>
    <div class="modal-body">부적절한 어휘가 포함되어 있습니다.</div>
    <div class="modal-btns">
      <button class="modal-btn solid" onclick="closeBadWordModal()">확인</button>
    </div>
  </div>
</div>

<!-- 스낵바 -->
<div class="snackbar" id="snackbar"></div>

<script>
  window.CHAT_TYPE = "{{ chat_type }}";
  window.GROUP_ID = "{{ group_id }}";
</script>
<script src="{{ url_for('static', filename='js/group_chat.js') }}"></script>
</body>
</html>
