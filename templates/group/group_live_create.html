<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
  <title>FITO - 라이브 만들기</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/group.css') }}"/>
</head>
<body>

<header class="gp-header">
  <a href="{{ url_for('group_main', id=group_id) }}" class="gp-back"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg></a>
  <span class="gp-header-title">라이브 만들기</span>
</header>

<div class="gp-content">
  <div class="gl-create-form">

    <!-- 4-1-1. 이름 설정 -->
    <div class="gc-field">
      <div class="gc-label">라이브 이름 <span class="gc-label-count"><span id="nameCount">0</span>/50</span></div>
      <input class="gc-input" id="liveName" type="text" placeholder="라이브 이름을 입력하세요" maxlength="50"/>
    </div>

    <!-- 공개/비공개 -->
    <div class="gc-field">
      <div class="gc-label">공개 설정</div>
      <div class="gc-toggle-row">
        <button class="gc-toggle-btn selected" id="btnPublic" onclick="setVisibility('public')">공개</button>
        <button class="gc-toggle-btn" id="btnPrivate" onclick="setVisibility('private')">비공개</button>
      </div>
    </div>

    <!-- 설명 -->
    <div class="gc-field">
      <div class="gc-label">라이브 설명</div>
      <textarea class="gc-textarea" id="liveDesc" placeholder="라이브에 대한 설명을 입력하세요" maxlength="400" style="min-height:80px"></textarea>
      <label style="display:flex;align-items:center;gap:6px;margin-top:8px;cursor:pointer">
        <input type="checkbox" id="recCheck" style="width:16px;height:16px;accent-color:#000"/>
        <span style="font-size:12px;color:var(--gray-500)">이 라이브를 녹화합니다</span>
      </label>
    </div>

    <!-- 4-1-2. 시간대 설정 -->
    <div class="gc-field">
      <div class="gc-label">시작 시간</div>
      <div class="gl-time-picker">
        <div class="gl-time-col">
          <div class="gl-time-label">시</div>
          <div class="gl-time-scroll" id="hourScroll"></div>
        </div>
        <span class="gl-time-sep">:</span>
        <div class="gl-time-col">
          <div class="gl-time-label">분</div>
          <div class="gl-time-scroll" id="minScroll"></div>
        </div>
      </div>
      <div style="text-align:center;margin-top:-8px">
        <span style="font-size:13px;font-weight:700" id="selectedTime">00:00</span>
        <span style="font-size:11px;color:var(--gray-400)"> 시작 예정</span>
      </div>
    </div>

    <!-- 4-1-3. 인원 설정 -->
    <div class="gc-field">
      <div class="gc-label">참여 인원 (4~8명)</div>
      <div class="gl-people-row">
        <button class="gl-people-btn" id="pplMinus" onclick="changePeople(-1)">−</button>
        <div class="gl-people-count" id="pplCount">4</div>
        <button class="gl-people-btn" id="pplPlus" onclick="changePeople(1)">+</button>
      </div>
      <div class="gl-people-label">명</div>
    </div>

  </div>

  <!-- 확정 버튼 -->
  <div class="gl-confirm-wrap">
    <button class="gc-submit-btn" id="confirmBtn" onclick="confirmLive()">라이브 만들기</button>
  </div>
</div>

<!-- 스낵바 -->
<div class="snackbar" id="snackbar"></div>

<nav class="bottom-nav">
  <a href="{{ url_for('main') }}" class="nav-item"><div class="nav-icon"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></div><span class="nav-label">홈</span></a>
  <a href="#" class="nav-item"><div class="nav-icon"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg></div><span class="nav-label">운동</span></a>
  <a href="{{ url_for('group') }}" class="nav-item active"><div class="nav-icon"><svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg></div><span class="nav-label">그룹</span></a>
  <a href="{{ url_for('analyze') }}" class="nav-item"><div class="nav-icon"><svg viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg></div><span class="nav-label">분석</span></a>
  <a href="#" class="nav-item"><div class="nav-icon"><svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div><span class="nav-label">MY</span></a>
</nav>

<script>
  window.URL_GROUP_MAIN = "{{ url_for('group_main', id=group_id) }}";
</script>
<script src="{{ url_for('static', filename='js/group_live_create.js') }}"></script>
</body>
</html>
