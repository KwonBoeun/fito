<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
  <title>FITO - 라이브 저장소</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/group.css') }}"/>
</head>
<body>

<header class="gp-header">
  <a href="{{ url_for('group_main', id=group_id) }}" class="gp-back"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg></a>
  <span class="gp-header-title">라이브 다시보기 저장소</span>
</header>

<!-- 정렬 바 -->
<div class="gs-sort-bar">
  <button class="gs-sort-btn active" id="sortLatest" onclick="setSort('latest',this)">최신순</button>
  <button class="gs-sort-btn" id="sortName" onclick="setSort('name',this)">이름순</button>
</div>

<div class="gp-content">
  <div class="gs-video-list" id="videoList"></div>
  <div class="gp-empty" id="emptyState" style="display:none">저장된 그룹 라이브 영상이 없습니다</div>
</div>

<!-- 영상 상세 보기 바텀시트 -->
<div class="bottom-sheet-overlay" id="videoOverlay" onclick="closeVideoDetail()"></div>
<div class="bottom-sheet" id="videoSheet" style="max-height:80vh">
  <div class="bottom-sheet-handle"></div>
  <div style="width:100%;aspect-ratio:16/9;background:#111;border-radius:var(--r-md);margin-bottom:12px;display:flex;align-items:center;justify-content:center">
    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,.4)" stroke-width="1.5"><polygon points="5 3 19 12 5 21 5 3"/></svg>
  </div>
  <div style="font-size:15px;font-weight:700;margin-bottom:4px" id="detailTitle"></div>
  <div style="font-size:11px;color:var(--gray-400);margin-bottom:12px" id="detailMeta"></div>
  <div style="display:flex;gap:8px">
    <button style="flex:1;padding:10px;background:var(--black);color:var(--white);border:none;border-radius:var(--r-md);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit">핏츠 만들기</button>
    <button style="flex:1;padding:10px;background:var(--gray-100);color:var(--black);border:none;border-radius:var(--r-md);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit">다운로드</button>
  </div>
</div>

<!-- 스낵바 -->
<div class="snackbar" id="snackbar"></div>

<nav class="bottom-nav">
  <a href="{{ url_for('main') }}" class="nav-item"><div class="nav-icon"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></div><span class="nav-label">홈</span></a>
  <a href="#" class="nav-item"><div class="nav-icon"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg></div><span class="nav-label">운동</span></a>
  <a href="{{ url_for('group') }}" class="nav-item active"><div class="nav-icon"><svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg></div><span class="nav-label">그룹</span></a>
  <a href="{{ url_for('analyze') }}" class="nav-item"><div class="nav-icon"><svg viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg></div><span class="nav-label">분석</span></a>
  <a href="#" class="nav-item"><div class="nav-icon"><svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div><span class="nav-label">MY</span></a>
</nav>

<script src="{{ url_for('static', filename='js/group_storage.js') }}"></script>
</body>
</html>
