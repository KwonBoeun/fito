<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
  <title>FITO - 운동 균형도</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/analyze_record.css') }}"/>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/calendar.css') }}"/>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
<header class="rc-header">
  <a href="{{ url_for('analyze_record') }}" class="rc-back"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg></a>
  <span class="rc-header-title">운동 균형도</span>
</header>

<div class="rc-content">
  <!-- 균형도 바디맵 -->
  <section class="rc-section rc-no-cursor">
    <div class="rc-section-header">
      <div class="rc-section-title">운동 균형도</div>
      <div style="display:flex;flex-direction:column;align-items:center;gap:4px">
        <div class="stat-cal-icon" id="openCalBtn">
          <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        </div>

      </div>
    </div>
    <div style="padding:0 0 8px;font-size:12px;color:#999" id="periodLabel">기간: 이번 주</div>
    <div style="display:flex;align-items:center;gap:20px">
      <div style="width:120px;height:200px;flex-shrink:0">
        <svg viewBox="0 0 100 180" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:100%">
          <ellipse cx="50" cy="18" rx="14" ry="16" fill="#e0e0e0"/>
          <rect x="44" y="32" width="12" height="8" rx="4" fill="#e0e0e0"/>
          <rect id="bUpper" x="24" y="40" width="52" height="42" rx="6" fill="#3b82f6" opacity="0.65"/>
          <text x="50" y="65" text-anchor="middle" font-size="9" fill="#fff" font-weight="700">상체</text>
          <rect id="bCore" x="30" y="82" width="40" height="26" rx="4" fill="#f5a623" opacity="0.65"/>
          <text x="50" y="99" text-anchor="middle" font-size="9" fill="#fff" font-weight="700">코어</text>
          <rect x="10" y="42" width="14" height="50" rx="7" fill="#3b82f6" opacity="0.45"/>
          <rect x="76" y="42" width="14" height="50" rx="7" fill="#3b82f6" opacity="0.45"/>
          <rect id="bLower" x="26" y="108" width="48" height="42" rx="6" fill="#2d9e5e" opacity="0.65"/>
          <text x="50" y="133" text-anchor="middle" font-size="9" fill="#fff" font-weight="700">하체</text>
          <rect x="28" y="150" width="20" height="28" rx="8" fill="#2d9e5e" opacity="0.45"/>
          <rect x="52" y="150" width="20" height="28" rx="8" fill="#2d9e5e" opacity="0.45"/>
        </svg>
      </div>
      <div style="flex:1;display:flex;flex-direction:column;gap:8px">
        <span id="balBadge" style="font-size:11px;font-weight:700;padding:3px 10px;border-radius:999px;background:#e8f7ef;color:#2d9e5e;white-space:nowrap;align-self:flex-end;margin-bottom:4px">균형 ✓</span>
        <div id="balScores" style="display:flex;flex-direction:column;gap:8px"></div>
      </div>
    </div>
    <div style="font-size:12px;text-align:center;margin-top:8px;color:#666" id="balMsg">균형이 아주 잘 잡힌 건강한 루틴입니다!</div>
  </section>

  <!-- 부위별 운동 비율 (도넛) -->
  <section class="rc-section rc-no-cursor">
    <div class="rc-section-header"><div class="rc-section-title">부위별 운동 비율</div></div>
    <div style="display:flex;align-items:center;gap:16px">
      <div style="width:150px;height:150px;flex-shrink:0"><canvas id="donutChart"></canvas></div>
      <div id="donutLegend" style="display:flex;flex-direction:column;gap:8px;flex:1"></div>
    </div>
    <div id="donutMsg" style="display:none" class="chart-empty">운동을 하여 부위별 운동 비율을 살펴보아요.</div>
  </section>

  <!-- 부위별 운동 빈도 (세로 막대) -->
  <section class="rc-section rc-no-cursor">
    <div class="rc-section-header"><div class="rc-section-title">부위별 운동 빈도</div></div>
    <div class="rc-section-sub" style="margin-bottom:12px">수행 횟수 × 강도 결합 데이터</div>
    <div class="chart-wrap" style="padding:10px"><div style="height:150px"><canvas id="freqChart"></canvas></div></div>
  </section>

  <!-- 부위별 운동 피로도 (가로 막대) -->
  <section class="rc-section rc-no-cursor">
    <div class="rc-section-header"><div class="rc-section-title">부위별 운동 피로도</div></div>
    <div class="rc-section-sub" style="margin-bottom:12px">피로도 = 강도 × 볼륨 × 회복계수 / 기준값 × 100</div>
    <div class="chart-wrap" style="padding:10px"><div style="height:150px"><canvas id="fatigueChart"></canvas></div></div>
  </section>
</div>


<!-- 캘린더 모달 -->
<div class="cal-modal-overlay" id="calModalOverlay"></div>
<div class="cal-modal" id="calModal" style="display:none">
  <div class="cal-period-row">
    <button class="cal-period-tab active" data-period="week">1주일</button>
    <button class="cal-period-tab" data-period="month">1개월</button>
    <button class="cal-period-tab" data-period="3month">3개월</button>
    <button class="cal-period-tab" data-period="6month">6개월</button>
    <button class="cal-period-tab" data-period="year">1년</button>
  </div>
  <div class="cal-month-nav">
    <div class="cal-nav-arrow cal-prev"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg></div>
    <button class="cal-month-btn" id="calMonthTitle">1월</button>
    <div class="cal-nav-arrow cal-next"><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></div>
  </div>
  <div class="cal-day-labels">
    <div class="cal-day-lbl">S</div><div class="cal-day-lbl">M</div>
    <div class="cal-day-lbl">T</div><div class="cal-day-lbl">W</div>
    <div class="cal-day-lbl">T</div><div class="cal-day-lbl">F</div>
    <div class="cal-day-lbl">S</div>
  </div>
  <div class="cal-grid" id="calGridBody"></div>
  <div class="cal-month-picker" id="calMonthPicker"></div>
  <div class="cal-footer">
    <button class="cal-cancel-btn"  id="calCancelBtn">취소</button>
    <button class="cal-confirm-btn" id="calConfirmBtn">선택</button>
  </div>
</div>

<!-- Bottom Navigation -->
<nav class="bottom-nav" id="bottom-nav"></nav>
<script src="{{ url_for('static', filename='js/nav.js') }}"></script>

<script src="{{ url_for('static', filename='js/calendar.js') }}"></script>
<script src="{{ url_for('static', filename='js/analyze_record_balance.js') }}"></script>
<script>
var calInstance = initCalendar({
  overlayId:     'calModalOverlay',
  modalId:       'calModal',
  gridId:        'calGridBody',
  titleId:       'calMonthTitle',
  monthPickerId: 'calMonthPicker',
  confirmId:     'calConfirmBtn',
  cancelId:      'calCancelBtn',
  onConfirm: function(startDate, endDate, periodType) {
    var label = document.getElementById('periodLabel');
    if (startDate && endDate) {
      function fmt(d, otherD) {
        return d.getFullYear() !== otherD.getFullYear()
          ? d.getFullYear() + '.' + (d.getMonth()+1) + '.' + d.getDate()
          : (d.getMonth()+1) + '.' + d.getDate();
      }
      var s = startDate <= endDate ? startDate : endDate;
      var e = startDate <= endDate ? endDate : startDate;
      label.textContent = '기간: ' + fmt(s, e) + ' ~ ' + fmt(e, s);
    }
    if (typeof updateBalanceByPeriod === 'function') {
      updateBalanceByPeriod(startDate, endDate, periodType);
    }
  }
});
document.getElementById('openCalBtn').addEventListener('click', function() {
  calInstance.open();
});
</script>
</body>
</html>
