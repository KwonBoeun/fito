<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
  <title>FITO - 그룹 만들기</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/group.css') }}"/>
</head>
<body>

<header class="gp-header">
  <a href="{{ url_for('group') }}" class="gp-back"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg></a>
  <span class="gp-header-title">그룹 만들기</span>
</header>

<div class="gp-content">
  <div class="gc-form">
    <div class="gc-field">
      <div class="gc-label">그룹 이미지</div>
      <div style="display:flex;gap:12px">
        <div id="profileImgArea" style="width:80px;height:80px;border-radius:50%;background:var(--gray-100);border:2px dashed var(--gray-300);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;overflow:hidden">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#ccc" stroke-width="1.5"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
        </div>
        <div id="bannerImgArea" style="flex:1;height:80px;border-radius:var(--r-md);background:var(--gray-100);border:2px dashed var(--gray-300);display:flex;align-items:center;justify-content:center;cursor:pointer;overflow:hidden">
          <span style="font-size:12px;color:var(--gray-400)">배경 이미지</span>
        </div>
      </div>
    </div>
    <div class="gc-field">
      <div class="gc-label">그룹명 <span class="gc-label-count"><span id="nameCount">0</span>/50</span></div>
      <input class="gc-input" id="groupName" type="text" placeholder="그룹명을 입력하세요" maxlength="50"/>
    </div>
    <div class="gc-field">
      <div class="gc-label">공개 설정</div>
      <div class="gc-toggle-row">
        <button class="gc-toggle-btn selected" id="btnPublic" onclick="setVisibility('public')">공개</button>
        <button class="gc-toggle-btn" id="btnPrivate" onclick="setVisibility('private')">비공개</button>
      </div>
    </div>
    <div class="gc-field">
      <div class="gc-label">그룹 설명 <span class="gc-label-count"><span id="descCount">0</span>/400</span></div>
      <textarea class="gc-textarea" id="groupDesc" placeholder="그룹에 대한 설명을 입력하세요" maxlength="400"></textarea>
    </div>
    <div class="gc-field">
      <div class="gc-label">해시태그 <span class="gc-label-count"><span id="tagCountLabel">0</span>/20</span></div>
      <div class="gc-tags-wrap" id="tagsWrap"></div>
      <div class="gc-tag-input-row">
        <input class="gc-tag-input" id="tagInput" type="text" placeholder="태그 입력 (최대 30자)" maxlength="30"/>
        <button class="gc-tag-add-btn" onclick="addTag()">추가</button>
      </div>
    </div>
  </div>
  <div class="gc-submit-wrap">
    <button class="gc-submit-btn" id="submitBtn" onclick="submitGroup()" disabled>그룹 만들기</button>
  </div>
</div>

<div class="snackbar" id="snackbar"></div>

<!-- Bottom Navigation -->
<nav class="bottom-nav" id="bottom-nav"></nav>
<script src="{{ url_for('static', filename='js/nav.js') }}"></script>

<script src="{{ url_for('static', filename='js/group_store.js') }}"></script>
<script src="{{ url_for('static', filename='js/group_create.js') }}"></script>
</body>
</html>
