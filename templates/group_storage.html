<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
  <title>FITO - 라이브 저장소</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/group.css') }}"/>
  <style>
    .fits-tl{width:100%;height:48px;background:var(--gray-100);border-radius:10px;position:relative;margin-bottom:10px;touch-action:none}
    .fits-tl-fill{position:absolute;top:0;bottom:0;background:rgba(0,0,0,.12);border:2px solid var(--black);border-radius:8px;pointer-events:none}
    .fits-tl-handle{position:absolute;top:-2px;bottom:-2px;width:16px;background:var(--black);border-radius:4px;cursor:ew-resize;z-index:5;touch-action:none}
    .fits-tl-handle::after{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:2px;height:16px;background:rgba(255,255,255,.6);border-radius:1px}
    .ml-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;cursor:pointer;transition:all .15s;margin-bottom:4px}
    .ml-item.sel{background:var(--black);color:var(--white)}
    .ml-item:not(.sel){background:var(--gray-50)}
    .cap-row{display:flex;gap:6px;align-items:center;margin-bottom:8px}
    .cap-input{padding:7px 10px;border:1.5px solid var(--gray-200);border-radius:8px;font-size:12px;font-family:inherit;outline:none}
    .cap-input:focus{border-color:var(--black)}
  </style>
</head>
<body>
<header class="gp-header">
  <a href="{{ url_for('group_main', id=group_id) }}" class="gp-back"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg></a>
  <span class="gp-header-title">라이브 다시보기 저장소</span>
</header>
<div class="gs-sort-bar">
  <button class="gs-sort-btn active" onclick="setSort('latest',this)">최신순</button>
  <button class="gs-sort-btn" onclick="setSort('name',this)">이름순</button>
</div>
<div class="gp-content">
  <div class="gs-video-list" id="videoList"></div>
  <div class="gp-empty" id="emptyState" style="display:none">저장된 그룹 라이브 영상이 없습니다</div>
</div>

<!-- 영상 상세 + 재생 -->
<div class="bottom-sheet-overlay" id="videoOverlay" onclick="closeVideoDetail()"></div>
<div class="bottom-sheet" id="videoSheet" style="max-height:85vh;overflow-y:auto">
  <div class="bottom-sheet-handle"></div>
  <div id="playerArea"></div>
  <div style="font-size:15px;font-weight:700;margin-bottom:4px" id="detailTitle"></div>
  <div style="font-size:11px;color:var(--gray-400);margin-bottom:12px" id="detailMeta"></div>
  <div style="display:flex;gap:8px">
    <button onclick="openFitsEditor()" style="flex:1;padding:10px;background:var(--black);color:var(--white);border:none;border-radius:12px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit">핏츠 만들기</button>
    <button onclick="showSnackbar('다운로드를 시작합니다')" style="flex:1;padding:10px;background:var(--gray-100);color:#000;border:none;border-radius:12px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit">다운로드</button>
  </div>
</div>

<!-- 핏츠 만들기 -->
<div class="bottom-sheet-overlay" id="fitsOverlay" onclick="closeFitsEditor()"></div>
<div class="bottom-sheet" id="fitsSheet" style="max-height:92vh;overflow-y:auto">
  <div class="bottom-sheet-handle"></div>
  <div style="font-size:16px;font-weight:700;margin-bottom:14px">핏츠 만들기</div>
  <div style="padding:0 4px">
    <!-- 미리보기 -->
    <div style="width:100%;aspect-ratio:9/16;background:#111;border-radius:12px;margin-bottom:14px;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,.3)" stroke-width="1.5"><polygon points="5 3 19 12 5 21 5 3"/></svg>
      <div style="position:absolute;top:8px;left:8px;font-size:11px;color:#fff;background:rgba(0,0,0,.5);padding:2px 8px;border-radius:999px" id="fitsSourceTitle"></div>
    </div>

    <!-- 구간 선택 (드래그 핸들) -->
    <div style="font-size:13px;font-weight:700;margin-bottom:8px">구간 선택 <span style="font-size:11px;color:var(--gray-400);font-weight:400">(핸들을 드래그하세요)</span></div>
    <div class="fits-tl" id="fitsTimelineBar">
      <div class="fits-tl-fill" id="fitsFill"></div>
      <div class="fits-tl-handle" id="fitsHandleL" style="left:10%"></div>
      <div class="fits-tl-handle" id="fitsHandleR" style="left:50%"></div>
    </div>
    <div style="display:flex;justify-content:space-between;margin-bottom:14px">
      <span style="font-size:12px;font-weight:600" id="fitsStartTime">00:00</span>
      <span style="font-size:12px;font-weight:700;color:var(--blue)" id="fitsDuration">30초</span>
      <span style="font-size:12px;font-weight:600" id="fitsEndTime">00:30</span>
    </div>

    <!-- 음악 선택 (리스트) -->
    <div style="font-size:13px;font-weight:700;margin-bottom:8px">음악 선택</div>
    <div id="musicListEl" style="max-height:200px;overflow-y:auto;margin-bottom:14px"></div>

    <!-- 자막 추가 (구간 선택) -->
    <div style="font-size:13px;font-weight:700;margin-bottom:8px">자막 추가</div>
    <div id="fitsCaptionList" style="margin-bottom:8px"></div>
    <div class="cap-row">
      <input id="fitsCaptionText" class="cap-input" type="text" placeholder="자막 내용" style="flex:1"/>
      <input id="fitsCaptionStart" class="cap-input" type="text" placeholder="시작" style="width:56px;text-align:center"/>
      <span style="color:var(--gray-400)">~</span>
      <input id="fitsCaptionEnd" class="cap-input" type="text" placeholder="종료" style="width:56px;text-align:center"/>
      <button onclick="addFitsCaption()" style="padding:7px 12px;background:var(--black);color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit">추가</button>
    </div>

    <!-- 설명 -->
    <div style="font-size:13px;font-weight:700;margin-bottom:8px">핏츠 설명</div>
    <textarea id="fitsDesc" placeholder="핏츠에 대한 설명" style="width:100%;padding:10px;border:1.5px solid var(--gray-200);border-radius:10px;font-size:13px;font-family:inherit;outline:none;resize:none;min-height:60px"></textarea>
    <button onclick="shareFits()" style="width:100%;padding:14px;background:var(--black);color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:12px">핏츠 공유하기</button>
  </div>
</div>

<div class="snackbar" id="snackbar"></div>

<!-- Bottom Navigation -->
<nav class="bottom-nav" id="bottom-nav"></nav>
<script src="{{ url_for('static', filename='js/nav.js') }}"></script>

<script src="{{ url_for('static', filename='js/group_store.js') }}"></script>
<script src="{{ url_for('static', filename='js/group_storage.js') }}"></script>
</body>
</html>
