<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
  <title>FITO - VOD 업로드</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/upload_vod.css') }}"/>
</head>
<body>

<header class="vup-header">
  <button class="vup-back" onclick="history.back()">
    <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
  </button>
  <span class="vup-header-title">VOD 영상 편집</span>
  <button class="vup-done-btn" id="done-btn" disabled>완료</button>
</header>

<!-- 파일 선택 화면 -->
<div class="vup-pick-screen" id="pick-screen">
  <div class="vup-pick-area">
    <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
    <p class="vup-pick-title">영상을 선택해주세요</p>
    <p class="vup-pick-sub">mp4, mov, webm · 최대 500MB</p>
    <button class="vup-pick-btn" id="pick-btn">라이브러리에서 선택</button>
    <input type="file" id="file-input" accept="video/*" style="display:none"/>
  </div>
</div>

<!-- 편집 화면 -->
<div class="vup-editor" id="editor" style="display:none">
  <!-- 프리뷰 -->
  <div class="vup-preview-wrap" id="preview-wrap">
    <video class="vup-video" id="preview-video" playsinline></video>
    <div class="vup-play-overlay" id="play-overlay">
      <svg viewBox="0 0 24 24" fill="white"><polygon points="5 3 19 12 5 21 5 3"/></svg>
    </div>
    <div class="vup-text-layer" id="text-layer"></div>
    <div class="vup-music-badge" id="music-badge" style="display:none">
      <svg viewBox="0 0 24 24"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
      <span id="music-badge-name">BGM</span>
    </div>
    <button class="vup-fullscreen-btn" id="fullscreen-btn">
      <svg viewBox="0 0 24 24"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg>
    </button>
  </div>

  <!-- 시간 + 완료 -->
  <div class="vup-top-ctrl">
    <div class="vup-time-disp">
      <button class="vup-play-btn" id="play-btn">
        <svg id="play-ico" viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        <svg id="pause-ico" viewBox="0 0 24 24" style="display:none"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
      </button>
      <span id="cur-time">0:00</span>
      <span class="time-sep">/</span>
      <span id="total-time">0:00</span>
    </div>
    <button class="vup-done-sm" id="done-sm-btn" disabled>완료</button>
  </div>

  <!-- 타임라인 -->
  <div class="vup-timeline-wrap" id="timeline-wrap">
    <div class="vup-ruler" id="ruler"></div>
    <div class="vup-playhead" id="playhead"></div>

    <!-- 미디어 트랙 -->
    <div class="vup-track-row">
      <div class="vup-track-icon">
        <svg viewBox="0 0 24 24"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></svg>
      </div>
      <div class="vup-track-body" id="media-track">
        <div class="vup-clip" id="main-clip">
          <span id="clip-label">미디어</span>
          <div class="trim-handle trim-left"  id="trim-left"></div>
          <div class="trim-handle trim-right" id="trim-right"></div>
        </div>
      </div>
    </div>

    <!-- 텍스트 트랙 -->
    <div class="vup-track-row" id="text-track-row" style="display:none">
      <div class="vup-track-icon">
        <svg viewBox="0 0 24 24"><polyline points="4 7 4 4 20 4 20 7"/><line x1="9" y1="20" x2="15" y2="20"/><line x1="12" y1="4" x2="12" y2="20"/></svg>
      </div>
      <div class="vup-track-body" id="text-track-body"></div>
    </div>

    <!-- 음악 트랙 -->
    <div class="vup-track-row" id="music-track-row" style="display:none">
      <div class="vup-track-icon">
        <svg viewBox="0 0 24 24"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
      </div>
      <div class="vup-track-body" id="music-track-body"></div>
    </div>
  </div>

  <!-- 툴바 -->
  <div class="vup-toolbar">
    <button class="vup-tool" data-tool="cut">
      <svg viewBox="0 0 24 24"><circle cx="6" cy="6" r="3"/><circle cx="6" cy="18" r="3"/><line x1="20" y1="4" x2="8.12" y2="15.88"/><line x1="14.47" y1="14.48" x2="20" y2="20"/><line x1="8.12" y1="8.12" x2="12" y2="12"/></svg>
      <span>자르기</span>
    </button>
    <button class="vup-tool" data-tool="range">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="3" x2="9" y2="21"/><line x1="15" y1="3" x2="15" y2="21"/></svg>
      <span>구간선택</span>
    </button>
    <button class="vup-tool" data-tool="text">
      <svg viewBox="0 0 24 24"><polyline points="4 7 4 4 20 4 20 7"/><line x1="9" y1="20" x2="15" y2="20"/><line x1="12" y1="4" x2="12" y2="20"/></svg>
      <span>텍스트</span>
    </button>
    <button class="vup-tool" data-tool="music">
      <svg viewBox="0 0 24 24"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
      <span>배경음악</span>
    </button>
    <button class="vup-tool" data-tool="media">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
      <span>미디어</span>
    </button>
  </div>

  <!-- 패널: 자르기 -->
  <div class="vup-panel" id="panel-cut">
    <button class="panel-btn" id="cut-here-btn">
      <svg viewBox="0 0 24 24"><circle cx="6" cy="6" r="3"/><circle cx="6" cy="18" r="3"/><line x1="20" y1="4" x2="8.12" y2="15.88"/></svg>
      현재 위치에서 자르기
    </button>
    <button class="panel-btn danger" id="cut-undo-btn">
      <svg viewBox="0 0 24 24"><polyline points="9 14 4 9 9 4"/><path d="M20 20v-7a4 4 0 0 0-4-4H4"/></svg>
      마지막 자르기 취소
    </button>
  </div>

  <!-- 패널: 구간선택 -->
  <div class="vup-panel" id="panel-range">
    <div class="range-row">
      <div class="range-cell"><label>시작</label><span id="range-start-val">0:00</span></div>
      <div class="range-arrow">→</div>
      <div class="range-cell"><label>끝</label><span id="range-end-val">—</span></div>
    </div>
    <div class="panel-btn-row">
      <button class="panel-btn" id="range-set-start">시작점 설정</button>
      <button class="panel-btn" id="range-set-end">끝점 설정</button>
      <button class="panel-btn accent" id="range-apply">구간 적용</button>
    </div>
  </div>

  <!-- 패널: 텍스트 -->
  <div class="vup-panel" id="panel-text">
    <div class="text-input-row">
      <input type="text" id="text-input" placeholder="텍스트를 입력하세요" maxlength="30"/>
      <button class="panel-btn accent" id="text-add-btn">추가</button>
    </div>
    <div class="text-style-row">
      <button class="style-btn active" data-size="sm">작게</button>
      <button class="style-btn" data-size="md">보통</button>
      <button class="style-btn" data-size="lg">크게</button>
      <div class="color-dots" id="color-dots"></div>
    </div>
    <div class="text-item-list" id="text-item-list"></div>
  </div>

  <!-- 패널: 배경음악 -->
  <div class="vup-panel" id="panel-music">
    <div class="music-list" id="music-list"></div>
  </div>

  <!-- 패널: 미디어 -->
  <div class="vup-panel" id="panel-media">
    <button class="panel-btn accent" id="media-add-btn">
      <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      갤러리에서 추가
    </button>
    <input type="file" id="media-file-input" accept="image/*,video/*" multiple style="display:none"/>
    <div class="media-thumb-list" id="media-thumb-list"></div>
  </div>
</div>

<!-- 업로드 정보 시트 -->
<div class="vup-info-sheet" id="info-sheet" style="display:none">
  <div class="info-inner">
    <h2>업로드 정보</h2>
    <div class="info-field">
      <label>제목 <span class="req">*</span></label>
      <input type="text" id="info-title" placeholder="VOD 제목을 입력하세요" maxlength="60"/>
    </div>
    <div class="info-field">
      <label>설명</label>
      <textarea id="info-desc" placeholder="영상 설명을 입력하세요" rows="3" maxlength="200"></textarea>
    </div>
    <div class="info-field">
      <label>해시태그</label>
      <input type="text" id="info-tags" placeholder="#운동 #홈트 (띄어쓰기로 구분)"/>
    </div>
    <div class="info-btns">
      <button class="info-cancel" id="info-cancel">취소</button>
      <button class="info-upload" id="info-upload">업로드</button>
    </div>
  </div>
</div>

<!-- 업로드 진행 -->
<div class="vup-uploading" id="uploading-ov" style="display:none">
  <div class="uploading-box">
    <div class="uploading-spinner"></div>
    <p id="uploading-label">업로드 중...</p>
    <div class="uploading-bar-wrap"><div class="uploading-bar" id="uploading-bar"></div></div>
    <span id="uploading-pct">0%</span>
  </div>
</div>

<!-- 업로드 완료 -->
<div class="vup-done-ov" id="done-ov" style="display:none">
  <div class="done-box">
    <div class="done-check"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></div>
    <p class="done-title">업로드 완료!</p>
    <p class="done-sub">메인화면에서 확인하세요</p>
    <button class="done-home" onclick="location.href='/'">홈으로 이동</button>
  </div>
</div>

<script src="{{ url_for('static', filename='js/upload_vod.js') }}"></script>
</body>
</html>
