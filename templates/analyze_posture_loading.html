<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
  <title>FITO - 자세 분석 준비 중</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/analyze_posture.css') }}"/>
</head>
<body>

<header class="ps-header">
  <div class="ps-back" onclick="showExitModal()">
    <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
  </div>
  <span class="ps-header-title" id="loadingHeaderTitle">분석 준비 중</span>
</header>

<div class="ps-loading-wrap">
  <div class="ps-loading-icon">
    <div class="ps-loading-spinner"></div>
  </div>

  <div class="ps-loading-title" id="loadingTitle">분석을 준비하고 있어요</div>
  <div class="ps-loading-sub"  id="loadingSub">잠시만 기다려 주세요</div>

  <!-- 프로그레스 바 -->
  <div class="ps-progress-wrap">
    <div class="ps-progress-header">
      <span class="ps-progress-pct" id="progressPct">0%</span>
      <span class="ps-progress-time" id="progressTime">예상 시간 계산 중...</span>
    </div>
    <div class="ps-progress-bar">
      <div class="ps-progress-fill" id="progressFill" style="width:0%"></div>
    </div>
    <div class="ps-progress-label" id="progressLabel">데이터를 불러오는 중입니다...</div>
  </div>
</div>

<!-- 종료 팝업 -->
<div class="modal-wrap" id="exitModal">
  <div class="modal-box">
    <div class="modal-title" id="exitModalTitle">분석을 종료할까요?</div>
    <div class="modal-body"  id="exitModalBody">지금 종료하면 분석 데이터가 삭제됩니다.</div>
    <div class="modal-btns">
      <button class="modal-btn solid"   onclick="exitAnalysis()">지금 종료하기</button>
      <button class="modal-btn outline" onclick="closeExitModal()" id="continueBtn">분석 이어서 하기</button>
    </div>
  </div>
</div>

<!-- 타임아웃/오류 팝업 -->
<div class="modal-wrap" id="errorModal">
  <div class="modal-box">
    <div class="modal-title" id="errorTitle">분석을 실패하였습니다</div>
    <div class="modal-body"  id="errorBody">다시 시도해 주세요.</div>
    <div class="modal-btns">
      <button class="modal-btn solid"   onclick="retryAnalysis()">다시 시도하기</button>
      <button class="modal-btn outline" onclick="exitAnalysis()">종료하기</button>
    </div>
  </div>
</div>

<!-- 스낵바 -->
<div class="snackbar" id="snackbar"></div>

<script>
  const URL_REALTIME = "{{ url_for('analyze_posture_realtime') }}";
  const URL_REPORT   = "{{ url_for('analyze_posture_report') }}";
  const URL_POSTURE  = "{{ url_for('analyze_posture') }}";
  // URL 파라미터로 mode 결정
  const MODE = new URLSearchParams(location.search).get('mode') || 'upload';
  // upload: 영상 업로드 분석, realtime: 실시간 분석 준비
  const isRealtime = MODE === 'realtime';

  // 화면 텍스트 설정
  if (isRealtime) {
    document.getElementById('loadingHeaderTitle').textContent = '분석 준비 중';
    document.getElementById('loadingTitle').textContent = '실시간 분석을 준비하고 있어요';
    document.getElementById('exitModalTitle').textContent = '준비를 종료할까요?';
    document.getElementById('exitModalBody').textContent  = '지금 종료하면 분석 데이터가 삭제됩니다.';
    document.getElementById('continueBtn').textContent    = '분석 준비 기다리기';
  } else {
    document.getElementById('loadingTitle').textContent = '영상을 분석하고 있어요';
    document.getElementById('continueBtn').textContent  = '분석 이어서 하기';
  }

  /* ── 프로그레스 시뮬레이션 ── */
  let pct = 0;
  const labels = [
    '데이터를 불러오는 중입니다...',
    '골격 포인트를 인식하고 있어요...',
    '자세 각도를 계산하는 중이에요...',
    '결과를 정리하고 있어요...',
    '거의 다 됐어요!',
  ];
  let totalSec = isRealtime ? 20 : 120;
  let elapsed = 0;
  let warnShown = false, timeoutShown = false;

  const fill  = document.getElementById('progressFill');
  const pctEl = document.getElementById('progressPct');
  const timeEl= document.getElementById('progressTime');
  const lblEl = document.getElementById('progressLabel');

  function showSnackbar(msg) {
    const sb = document.getElementById('snackbar');
    sb.textContent = msg;
    sb.classList.add('show');
    setTimeout(() => sb.classList.remove('show'), 3000);
  }

  function formatSec(s) {
    const m = Math.floor(s / 60).toString().padStart(2,'0');
    const sec = (s % 60).toString().padStart(2,'0');
    return `${m}:${sec}`;
  }

  const timer = setInterval(() => {
    elapsed++;
    const remaining = Math.max(0, totalSec - elapsed);

    // 진행률 계산 (실제는 서버에서 받아야 하나, 시뮬레이션)
    pct = Math.min(Math.round((elapsed / totalSec) * 100), 99);
    fill.style.width = pct + '%';
    pctEl.textContent = pct + '%';
    timeEl.textContent = remaining > 0 ? `예상 ${formatSec(remaining)} 남음` : '거의 완료됐어요!';
    lblEl.textContent = labels[Math.min(Math.floor(pct/25), labels.length-1)];

    // 경고 문구 (영상: 4분, 실시간: 30초)
    const warnAt = isRealtime ? 30 : 240;
    if (elapsed === warnAt && !warnShown) {
      warnShown = true;
      document.getElementById('loadingSub').textContent =
        isRealtime
          ? '실시간 분석을 준비 중이에요. 조금만 더 기다려주세요.'
          : '영상 분석이 지연되고 있어요. 조금만 더 기다려주세요.';
    }

    // 타임아웃 (영상: 5분, 실시간: 1분)
    const timeoutAt = isRealtime ? 60 : 300;
    if (elapsed >= timeoutAt && !timeoutShown) {
      timeoutShown = true;
      clearInterval(timer);
      document.getElementById('errorTitle').textContent =
        isRealtime ? '분석 준비를 실패하였습니다' : '영상 분석을 실패하였습니다';
      document.getElementById('errorBody').textContent = '다시 시도해 주세요.';
      document.getElementById('errorModal').classList.add('open');
      return;
    }

    // 완료
    if (elapsed >= totalSec - 2) {
      clearInterval(timer);
      pct = 100;
      fill.style.width = '100%';
      pctEl.textContent = '100%';
      lblEl.textContent = '분석 완료!';
      setTimeout(() => {
        if (isRealtime) {
          location.href = URL_REALTIME;
        } else {
          location.href = URL_REPORT + "?mode=upload";
        }
      }, 600);
    }
  }, 1000);

  function showExitModal()  { document.getElementById('exitModal').classList.add('open'); }
  function closeExitModal() { document.getElementById('exitModal').classList.remove('open'); }
  function exitAnalysis()   { clearInterval(timer); location.href = URL_POSTURE; }
  function retryAnalysis()  {
    document.getElementById('errorModal').classList.remove('open');
    location.reload();
  }
</script>
</body>
</html>
