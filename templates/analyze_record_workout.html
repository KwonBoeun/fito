<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
  <title>FITO - 나의 운동 분석</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/analyze_record.css') }}"/>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
<header class="rc-header">
  <a href="{{ url_for('analyze_record') }}" class="rc-back"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg></a>
  <span class="rc-header-title">나의 운동 분석</span>
  <div class="rc-header-right">
    <div style="position:relative">
      <div class="more-btn" onclick="toggleMore()"><svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20"><circle cx="5" cy="12" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="19" cy="12" r="1.5"/></svg></div>
      <div class="more-dropdown" id="moreDropdown">
        <div class="more-dd-item" onclick="closeMore()">기록 추가</div>
        <div class="more-dd-item" onclick="closeMore()">기록 수정</div>
        <div class="more-dd-item" onclick="closeMore()">순서 편집</div>
        <div class="more-dd-item danger" onclick="showResetModal()">기록 초기화</div>
      </div>
    </div>
  </div>
</header>

<div class="rc-content">
  <!-- 나의 정보 -->
  <div class="rc-stat-bar rc-no-cursor">
    <div class="rc-date" id="rcDate">2025.00.00 (금)</div>
    <div class="rc-stats">
      <div class="rc-stat-item"><span class="rc-stat-label">나의 키</span><span class="rc-stat-value" id="sHeight">175cm</span></div>
      <div class="rc-stat-item"><span class="rc-stat-label">나의 체중</span><span class="rc-stat-value" id="sWeight">68kg</span></div>
      <div class="rc-stat-item"><span class="rc-stat-label">운동 시간</span><span class="rc-stat-value" id="sTime">01H 20M</span></div>
      <div class="rc-stat-item"><span class="rc-stat-label">칼로리</span><span class="rc-stat-value" id="sKcal">0420kcal</span></div>
    </div>
  </div>

  <!-- 오늘 운동 분석 레이더 -->
  <section class="rc-section rc-no-cursor">
    <div style="margin-bottom:10px">
      <div style="font-size:15px;font-weight:700">나의 오늘 운동은 <span id="topPct" style="color:#2d9e5e;font-size:19px;font-weight:900">상위 12%</span>이에요</div>
      <div style="font-size:12px;color:#666;margin-top:4px" id="radarSummary">지구력은 최고지만, 집중도가 낮아요.</div>
    </div>
    <div style="position:relative;width:240px;height:240px;margin:0 auto 12px">
      <canvas id="radarChart"></canvas>
    </div>
    <!-- 항목별 수치 -->
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px" id="radarScores"></div>
  </section>

  <!-- 오늘 한 운동 리스트 -->
  <section class="rc-section rc-no-cursor">
    <div class="rc-section-header"><div class="rc-section-title">오늘 한 운동</div></div>
    <div class="workout-list-wrap">
      <div class="workout-list" id="workoutList"></div>
    </div>
  </section>

  <!-- 분석 텍스트 -->
  <section class="rc-section rc-no-cursor">
    <div class="rc-section-header"><div class="rc-section-title">분석</div></div>
    <div class="analysis-box" id="analysisBox">데이터를 불러오는 중...</div>
  </section>
</div>

<!-- 초기화 모달 -->
<div class="modal-wrap" id="resetModal">
  <div class="modal-box">
    <div class="modal-title">기록을 초기화할까요?</div>
    <div class="modal-body">오늘 기록된 모든 운동 데이터가 삭제됩니다. 레이더 차트와 분석 요약도 함께 초기화됩니다.</div>
    <div class="modal-btns">
      <button class="modal-btn outline" onclick="closeReset()">취소</button>
      <button class="modal-btn danger" onclick="confirmReset()">초기화</button>
    </div>
  </div>
</div>

<nav class="bottom-nav">
  <a href="{{ url_for('main') }}" class="nav-item"><div class="nav-icon"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></div><span class="nav-label">홈</span></a>
  <a href="#" class="nav-item"><div class="nav-icon"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg></div><span class="nav-label">운동</span></a>
  <a href="{{ url_for('group') }}" class="nav-item"><div class="nav-icon"><svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg></div><span class="nav-label">그룹</span></a>
  <a href="{{ url_for('analyze') }}" class="nav-item active"><div class="nav-icon"><svg viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg></div><span class="nav-label">분석</span></a>
  <a href="#" class="nav-item"><div class="nav-icon"><svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div><span class="nav-label">MY</span></a>
</nav>
<script src="{{ url_for('static', filename='js/analyze_record_workout.js') }}"></script>
</body>
</html>
