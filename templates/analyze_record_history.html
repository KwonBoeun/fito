<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
  <title>FITO - 사용자 기록 변화</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/analyze_record.css') }}"/>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
<header class="rc-header">
  <a href="{{ url_for('analyze_record') }}" class="rc-back"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg></a>
  <span class="rc-header-title">사용자 기록 변화</span>
</header>

<div class="rc-stat-bar rc-no-cursor">
  <div class="rc-date" id="rcDate">2025.00.00 (금)</div>
  <div class="rc-stats">
    <div class="rc-stat-item"><span class="rc-stat-label">나의 키</span><span class="rc-stat-value" id="sHeight">175cm</span></div>
    <div class="rc-stat-item"><span class="rc-stat-label">나의 체중</span><span class="rc-stat-value" id="sWeight">68kg</span></div>
    <div class="rc-stat-item"><span class="rc-stat-label">운동 시간</span><span class="rc-stat-value" id="sTime">01H 20M</span></div>
    <div class="rc-stat-item"><span class="rc-stat-label">칼로리</span><span class="rc-stat-value" id="sKcal">0420kcal</span></div>
  </div>
</div>

<div class="period-bar">

  <div class="period-scroll">
    <button class="period-btn active">1주일</button>
    <button class="period-btn">1개월</button>
    <button class="period-btn">3개월</button>
    <button class="period-btn">6개월</button>
    <button class="period-btn">1년</button>
  </div>

  <button class="period-cal-btn" onclick="openCal()">
    <svg viewBox="0 0 24 24">
      <rect x="3" y="4" width="18" height="18" rx="2"/>
      <line x1="16" y1="2" x2="16" y2="6"/>
      <line x1="8" y1="2" x2="8" y2="6"/>
      <line x1="3" y1="10" x2="21" y2="10"/>
    </svg>
    날짜
  </button>

</div>
<div class="rc-content">
  <!-- 체중 변화 -->
  <section class="rc-section rc-no-cursor">
    <div class="rc-section-header" style="margin-bottom:4px">
      <div class="rc-section-title">나의 체중 변화</div>
      <span class="change-badge badge-none" id="weightBadge">변화 없음</span>
    </div>
    <div class="rc-section-sub" style="margin-bottom:12px">클릭하면 해당일 상세 수치를 확인할 수 있어요</div>
    <div class="chart-wrap" style="padding:10px">
      <div style="height:150px;position:relative">
        <canvas id="weightChart"></canvas>
        <div id="weightEmpty" class="chart-empty" style="display:none">체중 기록이 없습니다.<br><button style="margin-top:8px;padding:6px 16px;background:#000;color:#fff;border:none;border-radius:999px;font-size:12px;cursor:pointer;font-family:inherit">체중 입력하기</button></div>
      </div>
    </div>
    <div id="weightTooltip" style="display:none;font-size:12px;background:#f9f9f9;border-radius:8px;padding:8px 12px;margin-top:-4px;color:#333"></div>
  </section>

  <!-- 운동 시간 변화 -->
  <section class="rc-section rc-no-cursor">
    <div class="rc-section-header" style="margin-bottom:4px">
      <div class="rc-section-title">나의 운동 시간 변화</div>
    </div>
    <div class="rc-section-sub" style="margin-bottom:12px">진한 색 = 지난 기간보다 많이 운동 · 회색 = 감소</div>
    <div class="chart-wrap" style="padding:10px">
      <div style="height:150px;position:relative">
        <canvas id="timeChart"></canvas>
        <div id="timeEmpty" class="chart-empty" style="display:none">운동 기록이 없습니다.</div>
      </div>
    </div>
  </section>

  <!-- 칼로리 변화 -->
  <section class="rc-section rc-no-cursor">
    <div class="rc-section-header" style="margin-bottom:4px">
      <div class="rc-section-title">나의 칼로리 변화</div>
    </div>
    <div class="rc-section-sub" style="margin-bottom:12px">소모 칼로리 = MET × 체중(kg) × 운동시간(h) × 1.05</div>
    <div class="chart-wrap" style="padding:10px">
      <div style="height:150px;position:relative">
        <canvas id="kcalChart"></canvas>
        <div id="kcalEmpty" class="chart-empty" style="display:none">소모한 칼로리가 없습니다.</div>
      </div>
    </div>
  </section>
</div>

<!-- 달력 팝업 -->
<div class="cal-overlay" id="calOverlay" onclick="closeCal()"></div>
<div class="cal-popup" id="calPopup">
  <div class="cal-handle"></div>
  <div class="cal-period-btns">
    <button class="cal-period-btn active" onclick="setCalPeriod('week',this)">1주일</button>
    <button class="cal-period-btn" onclick="setCalPeriod('month',this)">1개월</button>
    <button class="cal-period-btn" onclick="setCalPeriod('3month',this)">3개월</button>
    <button class="cal-period-btn" onclick="setCalPeriod('6month',this)">6개월</button>
    <button class="cal-period-btn" onclick="setCalPeriod('year',this)">1년</button>
  </div>
  <div class="cal-nav">
    <div class="cal-nav-btn" onclick="prevMonth()"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg></div>
    <span class="cal-month-title" id="calTitle">2025년 3월</span>
    <div class="cal-nav-btn" onclick="nextMonth()"><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></div>
  </div>
  <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:8px">
    <div class="cal-day-label">일</div><div class="cal-day-label">월</div><div class="cal-day-label">화</div>
    <div class="cal-day-label">수</div><div class="cal-day-label">목</div><div class="cal-day-label">금</div><div class="cal-day-label">토</div>
  </div>
  <div class="cal-grid" id="calGrid"></div>
</div>

<nav class="bottom-nav">
  <a href="{{ url_for('main') }}" class="nav-item"><div class="nav-icon"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></div><span class="nav-label">홈</span></a>
  <a href="#" class="nav-item"><div class="nav-icon"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg></div><span class="nav-label">운동</span></a>
  <a href="{{ url_for('group') }}" class="nav-item"><div class="nav-icon"><svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg></div><span class="nav-label">그룹</span></a>
  <a href="{{ url_for('analyze') }}" class="nav-item active"><div class="nav-icon"><svg viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg></div><span class="nav-label">분석</span></a>
  <a href="#" class="nav-item"><div class="nav-icon"><svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div><span class="nav-label">MY</span></a>
</nav>
<script src="{{ url_for('static', filename='js/analyze_record_history.js') }}"></script>
</body>
</html>
