<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
  <title>FITO - 사용자 기록 변화</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/analyze_record.css') }}"/>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/calendar.css') }}"/>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>

<header class="rc-header">
  <a href="{{ url_for('analyze_record') }}" class="rc-back">
    <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
  </a>
  <span class="rc-header-title">사용자 기록 변화</span>
</header>

<!-- 스탯바 + 캘린더 아이콘 -->
<div class="rc-stat-bar rc-no-cursor" style="display:flex;align-items:flex-start;justify-content:space-between">
  <div style="flex:1">
    <div class="rc-date" id="rcDate">2025.00.00 (금)</div>
    <div class="rc-stats">
      <div class="rc-stat-item"><span class="rc-stat-label">나의 키</span><span class="rc-stat-value" id="sHeight">175cm</span></div>
      <div class="rc-stat-item"><span class="rc-stat-label">나의 체중</span><span class="rc-stat-value" id="sWeight">68kg</span></div>
      <div class="rc-stat-item"><span class="rc-stat-label">운동 시간</span><span class="rc-stat-value" id="sTime">01H 20M</span></div>
      <div class="rc-stat-item"><span class="rc-stat-label">칼로리</span><span class="rc-stat-value" id="sKcal">0420kcal</span></div>
    </div>
  </div>
  <div class="stat-cal-icon" id="openCalBtn">
    <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
  </div>
</div>

<div style="padding:8px 16px 0;font-size:12px;color:#999" id="selectedPeriodLabel">기간: 이번 주</div>

<div class="rc-content">
  <section class="rc-section rc-no-cursor">
    <div class="rc-section-header" style="margin-bottom:4px">
      <div class="rc-section-title">나의 체중 변화</div>
      <span class="change-badge badge-none" id="weightBadge">변화 없음</span>
    </div>
    <div class="rc-section-sub" style="margin-bottom:12px">클릭하면 해당일 상세 수치를 확인할 수 있어요</div>
    <div class="chart-wrap" style="padding:10px">
      <div style="height:150px;position:relative">
        <canvas id="weightChart"></canvas>
        <div id="weightEmpty" class="chart-empty" style="display:none">체중 기록이 없습니다.<br>
          <button style="margin-top:8px;padding:6px 16px;background:#000;color:#fff;border:none;border-radius:999px;font-size:12px;cursor:pointer;font-family:inherit">체중 입력하기</button>
        </div>
      </div>
    </div>
    <div id="weightTooltip" style="display:none;font-size:12px;background:#f9f9f9;border-radius:8px;padding:8px 12px;margin-top:-4px;color:#333"></div>
  </section>

  <section class="rc-section rc-no-cursor">
    <div class="rc-section-header" style="margin-bottom:4px">
      <div class="rc-section-title">나의 운동 시간 변화</div>
    </div>
    <div class="rc-section-sub" style="margin-bottom:12px">진한 색 = 지난 기간보다 많이 운동 · 회색 = 감소</div>
    <div class="chart-wrap" style="padding:10px">
      <div style="height:150px;position:relative">
        <canvas id="timeChart"></canvas>
        <div id="timeEmpty" class="chart-empty" style="display:none">운동 기록이 없습니다.</div>
      </div>
    </div>
  </section>

  <section class="rc-section rc-no-cursor">
    <div class="rc-section-header" style="margin-bottom:4px">
      <div class="rc-section-title">나의 칼로리 변화</div>
    </div>
    <div class="rc-section-sub" style="margin-bottom:12px">소모 칼로리 = MET × 체중(kg) × 운동시간(h) × 1.05</div>
    <div class="chart-wrap" style="padding:10px">
      <div style="height:150px;position:relative">
        <canvas id="kcalChart"></canvas>
        <div id="kcalEmpty" class="chart-empty" style="display:none">소모한 칼로리가 없습니다.</div>
      </div>
    </div>
  </section>
</div>

<!-- 캘린더 모달 -->
<div class="cal-modal-overlay" id="calModalOverlay"></div>
<div class="cal-modal" id="calModal" style="display:none">
  <div class="cal-period-row">
    <button class="cal-period-tab active" data-period="week">1주일</button>
    <button class="cal-period-tab" data-period="month">1개월</button>
    <button class="cal-period-tab" data-period="3month">3개월</button>
    <button class="cal-period-tab" data-period="6month">6개월</button>
    <button class="cal-period-tab" data-period="year">1년</button>
  </div>
  <div class="cal-month-nav">
    <div class="cal-nav-arrow cal-prev"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg></div>
    <button class="cal-month-btn" id="calMonthTitle">1월</button>
    <div class="cal-nav-arrow cal-next"><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></div>
  </div>
  <div class="cal-day-labels">
    <div class="cal-day-lbl">S</div><div class="cal-day-lbl">M</div>
    <div class="cal-day-lbl">T</div><div class="cal-day-lbl">W</div>
    <div class="cal-day-lbl">T</div><div class="cal-day-lbl">F</div>
    <div class="cal-day-lbl">S</div>
  </div>
  <div class="cal-grid" id="calGridBody"></div>
  <div class="cal-month-picker" id="calMonthPicker"></div>
  <div class="cal-footer">
    <button class="cal-cancel-btn"  id="calCancelBtn">취소</button>
    <button class="cal-confirm-btn" id="calConfirmBtn">선택</button>
  </div>
</div>

<!-- Bottom Navigation -->
<nav class="bottom-nav" id="bottom-nav"></nav>
<script src="{{ url_for('static', filename='js/nav.js') }}"></script>

<script src="{{ url_for('static', filename='js/calendar.js') }}"></script>
<script src="{{ url_for('static', filename='js/analyze_record_history.js') }}"></script>
<script>
var calInstance = initCalendar({
  overlayId:     'calModalOverlay',
  modalId:       'calModal',
  gridId:        'calGridBody',
  titleId:       'calMonthTitle',
  monthPickerId: 'calMonthPicker',
  confirmId:     'calConfirmBtn',
  cancelId:      'calCancelBtn',
  onConfirm: function(startDate, endDate, periodType) {
    var label = document.getElementById('selectedPeriodLabel');
    var map = { week:'이번 주', month:'1개월', '3month':'3개월', '6month':'6개월', year:'1년' };
    if (startDate && endDate) {
      function fmt(d, otherD) {
        return d.getFullYear() !== otherD.getFullYear()
          ? d.getFullYear() + '.' + (d.getMonth()+1) + '.' + d.getDate()
          : (d.getMonth()+1) + '.' + d.getDate();
      }
      var s = startDate <= endDate ? startDate : endDate;
      var e = startDate <= endDate ? endDate : startDate;
      label.textContent = '기간: ' + fmt(s, e) + ' ~ ' + fmt(e, s);
    } else {
      label.textContent = '기간: ' + (map[periodType] || periodType);
    }
    if (typeof updateChartsByPeriod === 'function') {
      updateChartsByPeriod(startDate, endDate, periodType);
    }
  }
});
document.getElementById('openCalBtn').addEventListener('click', function() {
  calInstance.open();
});
</script>
</body>
</html>
