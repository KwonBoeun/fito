<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
  <title>FITO - 라이브</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/detail.css') }}"/>
  <style>
    /* ── 페이지 전체 flex 구조 ── */
    html,body{height:100%;overflow:hidden}
    .live-page{display:flex;flex-direction:column;height:100vh;max-width:390px;margin:0 auto}
    /* ── 라이브 영상 영역 ── */
    .live-video{width:100%;aspect-ratio:16/9;background:var(--gray-200);
      flex-shrink:0;position:relative}
    .live-video-badge{position:absolute;top:12px;left:12px;
      background:var(--live-red);color:#fff;font-size:11px;font-weight:700;
      padding:3px 8px;border-radius:var(--r-sm);letter-spacing:.5px}
    .live-video-viewers{position:absolute;top:12px;right:12px;
      background:rgba(0,0,0,.55);color:#fff;font-size:11px;
      padding:3px 9px;border-radius:var(--r-full);display:flex;align-items:center;gap:4px}
    .live-video-viewers svg{width:12px;height:12px;stroke:#fff;fill:none;stroke-width:2}
    /* ── 방송 정보 ── */
    .live-info{padding:12px 16px 8px;flex-shrink:0}
    .live-title{font-size:16px;font-weight:700;margin-bottom:5px}
    .live-meta{display:flex;align-items:center;justify-content:space-between;
      font-size:12px;color:var(--gray-500)}
    .live-meta-l{display:flex;align-items:center;gap:4px}
    .live-meta-l svg{width:13px;height:13px;stroke:var(--gray-500);fill:none;stroke-width:2}
    .divider-line{height:1px;background:var(--gray-200);flex-shrink:0;margin:4px 0}
    /* ── 채팅 영역 (남은 공간 전부 차지) ── */
    .live-chat{flex:1;overflow:hidden;display:flex;flex-direction:column;min-height:0}
    .chat-list{flex:1;overflow-y:auto;padding:8px 16px 12px;scroll-behavior:smooth;
      display:flex;flex-direction:column;gap:0}
    .chat-list::-webkit-scrollbar{display:none}
    .chat-msg{display:flex;align-items:baseline;gap:6px;padding:3px 0;
      font-size:13px;line-height:1.45;animation:fadeIn .25s ease}
    @keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
    .chat-role-host{color:var(--live-red);font-weight:700;font-size:11px;flex-shrink:0}
    .chat-role-mod{color:#f59e0b;font-weight:700;font-size:11px;flex-shrink:0}
    .chat-name{font-weight:600;font-size:12px;flex-shrink:0;color:var(--black)}
    .chat-text{font-size:13px;color:var(--black);word-break:break-all}
    /* ── 채팅 입력 (페이지 하단 고정, flex-shrink:0) ── */
    .live-chat-input{flex-shrink:0;padding:8px 16px;
      padding-bottom:max(10px,env(safe-area-inset-bottom));
      background:var(--white);border-top:1px solid var(--gray-200);
      display:flex;align-items:center;gap:10px}
    .live-chat-input-wrap{flex:1;background:var(--gray-100);border-radius:var(--r-full);
      padding:9px 14px;display:flex;align-items:center}
    .live-chat-input-wrap input{border:none;background:none;outline:none;width:100%;
      font-size:13px;font-family:inherit}
    .live-chat-input-wrap input::placeholder{color:var(--gray-400)}
    .dt-header{flex-shrink:0}
  </style>
</head>
<body>
<div class="live-page">

  <!-- 헤더 -->
  <header class="dt-header">
    <button class="dt-back" onclick="history.back()">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <span class="dt-header-title" id="hdr-title">라이브</span>
    <button class="dt-more" id="more-btn">
      <svg viewBox="0 0 24 24" width="20" height="20">
        <circle cx="5" cy="12" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="19" cy="12" r="1.5"/>
      </svg>
    </button>
  </header>

  <!-- 영상 -->
  <div class="live-video">
    <span class="live-video-badge">LIVE</span>
    <div class="live-video-viewers">
      <svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
      <span id="viewer-count">0</span>명
    </div>
  </div>

  <!-- 방송 정보 -->
  <div class="live-info">
    <div class="live-title" id="live-title">로딩 중...</div>
    <div class="live-meta">
      <div class="live-meta-l">
        <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
        <span id="live-author"></span>
      </div>
      <span id="live-starttime"></span>
    </div>
  </div>

  <div class="divider-line"></div>

  <!-- 채팅 (flex:1로 남은 공간 전부) -->
  <div class="live-chat">
    <div class="chat-list" id="chat-list"></div>
  </div>

  <!-- 채팅 입력 (flex-shrink:0, 항상 하단 고정) -->
  <div class="live-chat-input">
    <div class="live-chat-input-wrap">
      <input type="text" id="chat-input" placeholder="채팅 입력" autocomplete="off"/>
    </div>
  </div>

</div><!-- /live-page -->

<!-- 더보기 팝업 -->
<div class="more-popup" id="more-popup">
  <div class="more-popup-bg" id="more-bg"></div>
  <div class="more-popup-box" id="more-box" style="top:56px;right:12px">
    <div class="more-popup-item">공유하기</div>
    <div class="more-popup-item danger">신고하기</div>
  </div>
</div>

<script src="{{ url_for('static', filename='js/live_detail.js') }}"></script>
</body>
</html>
