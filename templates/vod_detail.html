<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
  <title>FITO - VOD</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/detail.css') }}"/>
  <style>
    .vod-video{width:100%;aspect-ratio:16/9;background:var(--gray-200);position:relative}
    .vod-info-section{padding:14px 16px 12px}
    .vod-title{font-size:17px;font-weight:700;margin-bottom:8px;line-height:1.4}
    .vod-meta-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
    .vod-meta-l{font-size:12px;color:var(--gray-500)}
    .vod-author-row{display:flex;align-items:center;gap:10px;margin-bottom:12px}
    .vod-author-pic{width:36px;height:36px;border-radius:50%;background:var(--gray-200);flex-shrink:0}
    .vod-author-name{font-size:14px;font-weight:600;flex:1}
    .vod-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px}
    .vod-desc-toggle{font-size:12px;color:var(--gray-500);background:none;border:none;cursor:pointer;padding:2px 0}
    .vod-desc{font-size:13px;color:var(--gray-600);line-height:1.6;margin-top:6px;
      overflow:hidden;max-height:0;transition:max-height .3s ease}
    .vod-desc.open{max-height:200px}
    /* 댓글 */
    .vod-comment-hdr{display:flex;align-items:center;justify-content:space-between;
      padding:14px 16px 10px}
    .vod-comment-hdr span{font-size:14px;font-weight:700}
    .vod-comment-hdr a{font-size:12px;color:var(--gray-500);text-decoration:none}
    /* 추천 영상 */
    .rec-section{padding:14px 16px 0}
    .rec-section-title{font-size:14px;font-weight:700;margin-bottom:12px}
    .rec-card{display:flex;gap:12px;margin-bottom:14px;cursor:pointer}
    .rec-thumb{width:120px;height:68px;border-radius:var(--r-sm);background:var(--gray-200);
      flex-shrink:0;display:flex;align-items:center;justify-content:center;
      font-size:11px;color:var(--gray-400)}
    .rec-info{flex:1;min-width:0}
    .rec-title{font-size:13px;font-weight:600;overflow:hidden;display:-webkit-box;
      -webkit-line-clamp:2;-webkit-box-orient:vertical;line-height:1.4;margin-bottom:4px}
    .rec-meta{font-size:11px;color:var(--gray-500)}
  </style>
</head>
<body>

<header class="dt-header">
  <button class="dt-back" onclick="history.back()">
    <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
  </button>
  <span class="dt-header-title">VOD</span>
  <button class="dt-more" id="more-btn">
    <svg viewBox="0 0 24 24" width="20" height="20">
      <circle cx="5" cy="12" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="19" cy="12" r="1.5"/>
    </svg>
  </button>
</header>

<!-- 영상 -->
<div class="vod-video"></div>

<!-- VOD 정보 -->
<div class="vod-info-section">
  <div class="vod-title" id="vod-title">로딩 중...</div>
  <div class="vod-meta-row">
    <span class="vod-meta-l" id="vod-meta"></span>
    <div class="reaction-row">
      <button class="rc-btn" id="like-btn">
        <svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
        <span id="like-cnt">0</span>
      </button>
    </div>
  </div>
  <div class="vod-author-row">
    <div class="vod-author-pic"></div>
    <span class="vod-author-name" id="vod-author"></span>
    <button class="dt-sub-btn">구독</button>
  </div>
  <div class="vod-tags" id="vod-tags"></div>
  <button class="vod-desc-toggle" id="desc-toggle">영상 설명 보기 ▾</button>
  <div class="vod-desc" id="vod-desc">이 영상은 mock 데이터로 생성된 VOD입니다. 실제 영상 설명이 여기 표시됩니다.</div>
</div>

<div class="divider"></div>

<!-- 댓글 미리보기 -->
<div class="vod-comment-hdr">
  <span id="comment-cnt-label">댓글</span>
  <a href="#">전체보기</a>
</div>
<div style="padding:0 16px 12px" id="comment-preview"></div>

<div class="divider"></div>

<!-- 추천 영상 -->
<div class="rec-section">
  <div class="rec-section-title">추천 VOD</div>
  <div id="rec-list"></div>
</div>

<div class="scroll-pad"></div>

<!-- 댓글 입력창 -->
<div class="comment-input-bar">
  <div class="comment-input-pic"></div>
  <div class="comment-input-wrap">
    <input type="text" placeholder="댓글을 입력하세요" id="comment-input"/>
  </div>
  <button class="comment-send">
    <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
  </button>
</div>

<!-- 더보기 팝업 -->
<div class="more-popup" id="more-popup">
  <div class="more-popup-bg" id="more-bg"></div>
  <div class="more-popup-box" style="top:56px;right:12px">
    <div class="more-popup-item">공유하기</div>
    <div class="more-popup-item danger">신고하기</div>
  </div>
</div>

<script src="{{ url_for('static', filename='js/vod_detail.js') }}"></script>
</body>
</html>
