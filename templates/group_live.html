<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
  <title>FITO - 그룹 라이브</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/group.css') }}"/>
  <style>html,body{background:#111!important;max-width:100%;overflow-x:hidden}</style>
</head>
<body>

<div class="gl-wrap">
  <!-- 3-1-1. 상단바 -->
  <div class="gl-top-bar">
    <div style="display:flex;align-items:center;gap:10px">
      <button class="gl-top-btn" id="volumeBtn" onclick="toggleVolume()">
        <svg viewBox="0 0 24 24"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
      </button>
      <span class="gl-top-title" id="liveName">하체 라이브 같이해요</span>
    </div>
    <button class="gl-top-btn" onclick="exitLive()">
      <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>

  <!-- 3-1-2. 중심 화면 -->
  <div class="gl-main-video" id="mainVideo">
    <div class="gl-main-video-label" id="shareLabel">핏걸_나연</div>
    <div class="gl-rec-icon" id="recIcon" style="display:none">REC</div>
    <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center">
      <span style="color:rgba(255,255,255,.3);font-size:13px" id="videoPlaceholder">영상 공유 대기 중</span>
    </div>
  </div>

  <!-- 3-1-4. 공지 -->
  <div class="gl-notice-bar" id="noticeBar">
    <span class="gl-notice-bar-label">공지</span>
    <span class="gl-notice-bar-text" id="noticeText">오늘은 스쿼트 100개 챌린지입니다! 화이팅 💪</span>
  </div>

  <!-- 3-1-5. 참가자 화면 -->
  <div class="gl-participants" id="participantsGrid"></div>

  <!-- 3-1-6. 더보기 -->
  <div class="gl-more-participants" id="moreParticipants" onclick="toggleAllParticipants()">
    <span class="gl-more-participants-btn" id="moreBtn">더보기 ▼</span>
  </div>

  <!-- 3-1-3. 하단 도구바 -->
  <div class="gl-toolbar">
    <button class="gl-tool-btn" id="micBtn" onclick="toggleMic()">
      <svg viewBox="0 0 24 24"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
      <span>마이크</span>
    </button>
    <button class="gl-tool-btn" id="camBtn" onclick="toggleCam()">
      <svg viewBox="0 0 24 24"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>
      <span>카메라</span>
    </button>
    <button class="gl-tool-btn" id="emojiBtn" onclick="sendEmoji()">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>
      <span>이모티콘</span>
    </button>
    <button class="gl-tool-btn off" id="filterBtn" onclick="toggleFilter()">
      <svg viewBox="0 0 24 24"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>
      <span>필터</span>
    </button>
    <button class="gl-tool-btn" id="uploadBtn" onclick="sharScreen()">
      <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      <span>업로드</span>
    </button>
    <button class="gl-tool-btn" id="moreToolBtn" onclick="openMoreTools()">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="1"/><circle cx="12" cy="5" r="1"/><circle cx="12" cy="19" r="1"/></svg>
      <span>더보기</span>
    </button>
  </div>
</div>

<!-- 나가기 확인 팝업 -->
<div class="modal-wrap" id="exitModal">
  <div class="modal-box" style="color:var(--black)">
    <div class="modal-title">라이브를 나가시겠습니까?</div>
    <div class="modal-body">라이브에서 나가면 다시 입장해야 합니다.</div>
    <div class="modal-btns">
      <button class="modal-btn outline" onclick="closeExitModal()">취소</button>
      <button class="modal-btn solid" onclick="confirmExit()">나가기</button>
    </div>
  </div>
</div>

<!-- 더보기 바텀시트 (채팅, 공지) -->
<div class="bottom-sheet-overlay" id="moreOverlay" onclick="closeMoreTools()"></div>
<div class="bottom-sheet" id="moreSheet" style="max-height:50vh">
  <div class="bottom-sheet-handle"></div>
  <div style="font-size:15px;font-weight:700;margin-bottom:12px;color:var(--black)">더보기</div>
  <div style="display:flex;flex-direction:column;gap:8px">
    <div style="display:flex;align-items:center;gap:10px;padding:12px;background:var(--gray-50);border-radius:var(--r-md);cursor:pointer" onclick="openLiveChat()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      <span style="font-size:13px;font-weight:600;color:var(--black)">채팅</span>
    </div>
    <div style="display:flex;align-items:center;gap:10px;padding:12px;background:var(--gray-50);border-radius:var(--r-md);cursor:pointer" onclick="editNotice()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
      <span style="font-size:13px;font-weight:600;color:var(--black)">공지 수정</span>
    </div>
    <div style="display:flex;align-items:center;gap:10px;padding:12px;background:var(--gray-50);border-radius:var(--r-md);cursor:pointer" onclick="toggleRec()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3" fill="#e8161c"/></svg>
      <span style="font-size:13px;font-weight:600;color:var(--black)" id="recToggleLabel">녹화 시작</span>
    </div>
  </div>
</div>

<!-- ALL 보기 바텀시트 -->
<div class="bottom-sheet-overlay" id="allOverlay" onclick="closeAllView()"></div>
<div class="bottom-sheet" id="allSheet" style="max-height:70vh">
  <div class="bottom-sheet-handle"></div>
  <div style="font-size:15px;font-weight:700;margin-bottom:12px;color:var(--black)">참가자 전체 보기</div>
  <div id="allParticipantsGrid" style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px"></div>
</div>

<!-- 스낵바 -->
<div class="snackbar" id="snackbar"></div>

<script>
  window.URL_GROUP_MAIN = "{{ url_for('group_main') }}";
</script>
<script src="{{ url_for('static', filename='js/group_live.js') }}"></script>
</body>
</html>
