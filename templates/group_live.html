<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
  <title>FITO - 그룹 라이브</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/group.css') }}"/>
  <style>
    html,body{background:#111!important;overflow-x:hidden}
    @keyframes emojiFade{0%{opacity:1;transform:translate(-50%,-50%) scale(1)}100%{opacity:0;transform:translate(-50%,-120%) scale(1.5)}}
    /* 대기 화면 */
    .gl-waiting{position:fixed;inset:0;background:#111;z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff}
    .gl-waiting-title{font-size:18px;font-weight:700;margin-bottom:8px}
    .gl-waiting-sub{font-size:13px;color:rgba(255,255,255,.5);margin-bottom:24px}
    .gl-waiting-countdown{font-size:64px;font-weight:900;margin-bottom:12px}
    .gl-waiting-label{font-size:13px;color:rgba(255,255,255,.4)}
    .gl-waiting-exit{margin-top:32px;padding:10px 24px;background:rgba(255,255,255,.15);border:none;border-radius:999px;color:#fff;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
    /* ALL 풀스크린 오버레이 */
    .gl-all-fullscreen{position:fixed;inset:0;background:#111;z-index:300;display:none;flex-direction:column}
    .gl-all-header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px}
    .gl-all-grid{flex:1;display:grid;gap:4px;padding:8px;align-content:start}
    .gl-all-close{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.15);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center}
    .gl-all-close svg{width:18px;height:18px;stroke:#fff;fill:none;stroke-width:2}
  </style>
</head>
<body>
<div class="gl-wrap">
  <!-- 대기 화면 (시작 전 라이브) -->
  <div class="gl-waiting" id="waitingScreen" style="display:none">
    <div class="gl-waiting-title" id="waitLiveTitle">라이브 대기 중</div>
    <div class="gl-waiting-sub">시작 예정 시간: <span id="waitStartTime"></span></div>
    <div class="gl-waiting-countdown" id="waitCountdown">--:--</div>
    <div class="gl-waiting-label">시작까지 남은 시간</div>
    <button class="gl-waiting-exit" onclick="confirmExit()">나가기</button>
    <button class="gl-waiting-exit" style="margin-top:10px;background:rgba(255,255,255,.3)" onclick="openLiveChat()">💬 채팅하기</button>
  </div>

  <!-- 라이브 본 화면 -->
  <div id="liveContent">
    <div class="gl-top-bar">
      <div style="display:flex;align-items:center;gap:10px">
        <button class="gl-top-btn" id="volumeBtn" onclick="toggleVolume()">
          <svg viewBox="0 0 24 24"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
        </button>
        <span class="gl-top-title">그룹 라이브</span>
      </div>
      <button class="gl-top-btn" onclick="exitLive()">
        <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="gl-main-video">
      <div class="gl-main-video-label" id="shareLabel">핏걸_나연</div>
      <div class="gl-rec-icon" id="recIcon" style="display:none">REC</div>
      <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center">
        <span style="color:rgba(255,255,255,.3);font-size:13px">영상 공유 대기 중</span>
      </div>
    </div>
    <div class="gl-notice-bar"><span class="gl-notice-bar-label">공지</span><span class="gl-notice-bar-text" id="noticeText">오늘은 스쿼트 100개 챌린지입니다! 화이팅 💪</span></div>
    <div class="gl-participants" id="participantsGrid"></div>
    <div class="gl-more-participants" id="moreParticipants" onclick="toggleAllParticipants()"><span class="gl-more-participants-btn" id="moreBtn">더보기 ▼</span></div>

    <!-- 하단 도구바 (ALL 버튼 포함) -->
    <div class="gl-toolbar">
      <button class="gl-tool-btn" id="micBtn" onclick="toggleMic()"><svg viewBox="0 0 24 24"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg><span>마이크</span></button>
      <button class="gl-tool-btn" id="camBtn" onclick="toggleCam()"><svg viewBox="0 0 24 24"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg><span>카메라</span></button>
      <button class="gl-tool-btn" onclick="sendEmoji()"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg><span>이모티콘</span></button>
      <button class="gl-tool-btn off" id="filterBtn" onclick="toggleFilter()"><svg viewBox="0 0 24 24"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg><span>필터</span></button>
      <button class="gl-tool-btn" onclick="sharScreen()"><svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg><span>업로드</span></button>
      <!-- ALL 버튼 (하단 도구바) -->
      <button class="gl-tool-btn" onclick="openAllView()"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg><span>ALL</span></button>
      <button class="gl-tool-btn" onclick="openMoreTools()"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="1"/><circle cx="12" cy="5" r="1"/><circle cx="12" cy="19" r="1"/></svg><span>더보기</span></button>
    </div>
  </div>
</div>

<!-- ALL 풀스크린 뷰 -->
<div class="gl-all-fullscreen" id="allOverlay">
  <div class="gl-all-header">
    <span style="color:#fff;font-size:15px;font-weight:700">참가자 전체 보기</span>
    <button class="gl-all-close" onclick="closeAllView()"><svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
  </div>
  <div class="gl-all-grid" id="allGrid"></div>
</div>

<!-- 이모티콘 -->
<div class="bottom-sheet-overlay" id="emojiOverlay" onclick="closeEmoji()"></div>
<div class="bottom-sheet" id="emojiSheet"><div class="bottom-sheet-handle"></div><div style="font-size:15px;font-weight:700;margin-bottom:12px;color:var(--black)">이모티콘 선택</div><div id="emojiGrid" style="display:grid;grid-template-columns:repeat(6,1fr);gap:8px"></div></div>

<!-- 채팅 -->
<div class="bottom-sheet-overlay" id="chatOverlay" onclick="closeLiveChat()"></div>
<div class="bottom-sheet" id="chatSheet" style="max-height:60vh"><div class="bottom-sheet-handle"></div><div style="font-size:15px;font-weight:700;margin-bottom:12px;color:var(--black)">라이브 채팅</div><div id="liveChatList" style="max-height:200px;overflow-y:auto;margin-bottom:12px;padding:8px;background:var(--gray-50);border-radius:var(--r-md)"></div><div style="display:flex;gap:8px"><input id="liveChatInput" type="text" placeholder="메시지 입력" style="flex:1;padding:10px 14px;border:1.5px solid #e5e5e5;border-radius:20px;font-size:13px;font-family:inherit;outline:none" onkeydown="if(event.key==='Enter')sendLiveChat()"/><button onclick="sendLiveChat()" style="padding:10px 16px;background:#000;color:#fff;border:none;border-radius:20px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit">전송</button></div></div>

<!-- 공지 편집 -->
<div class="bottom-sheet-overlay" id="noticeEditOverlay" onclick="closeNoticeEdit()"></div>
<div class="bottom-sheet" id="noticeEditSheet"><div class="bottom-sheet-handle"></div><div style="font-size:15px;font-weight:700;margin-bottom:12px;color:var(--black)">공지 수정</div><textarea id="noticeEditInput" placeholder="공지 내용" style="width:100%;padding:12px;border:1.5px solid #e5e5e5;border-radius:12px;font-size:13px;font-family:inherit;outline:none;resize:none;min-height:80px"></textarea><div style="display:flex;gap:8px;margin-top:12px"><button onclick="closeNoticeEdit()" style="flex:1;padding:12px;background:var(--gray-100);color:#000;border:none;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit">취소</button><button onclick="saveNotice()" style="flex:1;padding:12px;background:#000;color:#fff;border:none;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit">저장</button></div></div>

<!-- 더보기 -->
<div class="bottom-sheet-overlay" id="moreOverlay" onclick="closeMoreTools()"></div>
<div class="bottom-sheet" id="moreSheet"><div class="bottom-sheet-handle"></div><div style="font-size:15px;font-weight:700;margin-bottom:12px;color:var(--black)">더보기</div><div style="display:flex;flex-direction:column;gap:8px">
  <div style="display:flex;align-items:center;gap:10px;padding:12px;background:var(--gray-50);border-radius:12px;cursor:pointer" onclick="openLiveChat()"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg><span style="font-size:13px;font-weight:600;color:#000">채팅</span></div>
  <div style="display:flex;align-items:center;gap:10px;padding:12px;background:var(--gray-50);border-radius:12px;cursor:pointer" onclick="editNotice()"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg><span style="font-size:13px;font-weight:600;color:#000">공지 수정</span></div>
  <div style="display:flex;align-items:center;gap:10px;padding:12px;background:var(--gray-50);border-radius:12px;cursor:pointer" onclick="toggleRec()"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3" fill="#e8161c"/></svg><span style="font-size:13px;font-weight:600;color:#000" id="recToggleLabel">녹화 시작</span></div>
</div></div>

<!-- 나가기 -->
<div class="modal-wrap" id="exitModal"><div class="modal-box" style="color:#000"><div class="modal-title">라이브를 나가시겠습니까?</div><div class="modal-body">라이브에서 나가면 다시 입장해야 합니다.</div><div class="modal-btns"><button class="modal-btn outline" onclick="closeExitModal()">취소</button><button class="modal-btn solid" onclick="confirmExit()">나가기</button></div></div></div>

<div class="snackbar" id="snackbar"></div>
<script>window.URL_GROUP_MAIN="{{url_for('group_main')}}";</script>
<script src="{{url_for('static',filename='js/group_live.js')}}"></script>
</body>
</html>
