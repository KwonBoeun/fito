<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
  <title>FITO - MY</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/mypage.css') }}"/>
</head>
<body>

<!-- ── 헤더 ── -->
<header class="my-header">
  <span class="my-header-title" id="myHeaderTitle">프로필</span>
</header>

<!-- ── 프로필 / 마이페이지 토글 ── -->
<div class="my-tab-toggle">
  <div class="my-toggle-wrap">
    <button class="my-toggle-btn active" id="tabProfile" onclick="switchMyTab('profile')">프로필</button>
    <button class="my-toggle-btn" id="tabMypage" onclick="switchMyTab('mypage')">마이페이지</button>
  </div>
</div>

<div class="my-content">

  <!-- ══════════════════════════════
       프로필 화면
       ══════════════════════════════ -->
  <div class="my-screen active" id="screenProfile">

    <!-- 프로필 상단 -->
    <div class="profile-top">
      <div class="profile-avatar-wrap">
        <div class="profile-avatar" id="profileAvatar">김</div>
      </div>
      <div class="profile-info">
        <div class="profile-name-row">
          <span class="profile-name" id="profileName">이름</span>
          <span class="profile-rank">랭킹 n위</span>
        </div>
        <div class="profile-stats">
          <div class="profile-stat">
            <span class="profile-stat-value">1H 25M</span>
            <span class="profile-stat-label">운동 시간</span>
          </div>
          <div class="profile-stat">
            <span class="profile-stat-value">00</span>
            <span class="profile-stat-label">게시물</span>
          </div>
          <div class="profile-stat">
            <span class="profile-stat-value" style="cursor:pointer" onclick="goFriends()">00</span>
            <span class="profile-stat-label" style="cursor:pointer" onclick="goFriends()">친구</span>
          </div>
          <div class="profile-stat">
            <span class="profile-stat-value">00</span>
            <span class="profile-stat-label">구독</span>
          </div>
        </div>
      </div>
    </div>

    <!-- 그룹 참여 정보 -->
    <div class="profile-groups">
      <div class="profile-group-avatars">
        <div class="profile-group-avatar">A</div>
        <div class="profile-group-avatar">B</div>
        <div class="profile-group-avatar">C</div>
      </div>
      <span class="profile-group-text">aaa, bbb, ccc 그룹 외 n개 그룹에 참여 중 입니다</span>
    </div>

    <!-- 버튼 -->
    <div class="profile-btns">
      <button class="profile-btn" onclick="alert('프로필 수정')">프로필 수정</button>
      <button class="profile-btn" onclick="goFriendRequest()">친구 요청 수락</button>
    </div>

    <!-- 콘텐츠 탭 -->
    <div class="profile-content-tabs">
      <!-- VOD/FITS -->
      <div class="profile-content-tab active" onclick="switchProfileTab(0, this)">
        <svg viewBox="0 0 24 24"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>
      </div>
      <!-- 핏츠 -->
      <div class="profile-content-tab" onclick="switchProfileTab(1, this)">
        <svg viewBox="0 0 24 24"><rect x="5" y="2" width="14" height="20" rx="2"/><line x1="12" y1="18" x2="12" y2="18"/></svg>
      </div>
      <!-- 커뮤니티/게시글 -->
      <div class="profile-content-tab" onclick="switchProfileTab(2, this)">
        <svg viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </div>
    </div>

    <!-- 콘텐츠 그리드 -->
    <div class="profile-grid" id="profileGrid">
      <!-- JS로 채움 -->
    </div>
    <div style="height:20px"></div><!-- 스크롤 여유 -->

  </div>

  <!-- ══════════════════════════════
       마이페이지 화면
       ══════════════════════════════ -->
  <div class="my-screen" id="screenMypage">

    <!-- 챌린지 -->
    <div class="mypage-section">
      <div class="mypage-section-title">챌린지</div>
      <div class="mypage-card" onclick="alert('챌린지')">
        <span class="mypage-card-empty">참여 중인 챌린지가 없어요</span>
      </div>
    </div>

    <!-- 리워드 -->
    <div class="mypage-section">
      <div class="mypage-section-title">리워드</div>
      <div class="mypage-card" onclick="alert('리워드')">
        <span class="mypage-card-empty">리워드 0</span>
      </div>
    </div>

    <!-- 메뉴 그룹 1: 콘텐츠 -->
    <div class="mypage-menu-group">
      <div class="mypage-menu-item" onclick="alert('내 좋아요')">
        <span class="mypage-menu-label">내 좋아요</span>
        <svg class="mypage-menu-arrow" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
      </div>
      <div class="mypage-menu-item" onclick="alert('내가 쓴 글')">
        <span class="mypage-menu-label">내가 쓴 글</span>
        <svg class="mypage-menu-arrow" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
      </div>
      <div class="mypage-menu-item" onclick="alert('임시 저장')">
        <span class="mypage-menu-label">임시 저장</span>
        <svg class="mypage-menu-arrow" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
      </div>
      <div class="mypage-menu-item" onclick="alert('북마크')">
        <span class="mypage-menu-label">북마크</span>
        <svg class="mypage-menu-arrow" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
      </div>
    </div>

    <!-- 메뉴 그룹 2: 관리 -->
    <div class="mypage-menu-group">
      <div class="mypage-menu-item" onclick="alert('계정 관리')">
        <span class="mypage-menu-label">계정 관리</span>
        <svg class="mypage-menu-arrow" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
      </div>
      <div class="mypage-menu-item" onclick="alert('구독 관리')">
        <span class="mypage-menu-label">구독 관리</span>
        <svg class="mypage-menu-arrow" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
      </div>
      <div class="mypage-menu-item" onclick="alert('결제 수단 관리')">
        <span class="mypage-menu-label">결제 수단 관리</span>
        <svg class="mypage-menu-arrow" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
      </div>
      <div class="mypage-menu-item" onclick="alert('구독 결제 관리')">
        <span class="mypage-menu-label">구독 결제 관리</span>
        <svg class="mypage-menu-arrow" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
      </div>
    </div>

    <!-- 메뉴 그룹 3: 이벤트/공지 -->
    <div class="mypage-menu-group">
      <div class="mypage-menu-item" onclick="alert('공지사항')">
        <span class="mypage-menu-label">공지사항</span>
        <svg class="mypage-menu-arrow" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
      </div>
      <div class="mypage-menu-item" onclick="alert('이벤트')">
        <span class="mypage-menu-label">이벤트</span>
        <svg class="mypage-menu-arrow" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
      </div>
    </div>

    <!-- 메뉴 그룹 4: 설정 -->
    <div class="mypage-menu-group">
      <div class="mypage-menu-item" onclick="alert('설정')">
        <span class="mypage-menu-label">설정</span>
        <svg class="mypage-menu-arrow" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
      </div>
      <div class="mypage-menu-item logout" onclick="alert('로그아웃')">
        <span class="mypage-menu-label">로그아웃</span>
        <svg class="mypage-menu-arrow" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
      </div>
    </div>

  </div><!-- /screenMypage -->

</div><!-- /my-content -->

<!-- Bottom Navigation -->
<nav class="bottom-nav" id="bottom-nav"></nav>
<script src="{{ url_for('static', filename='js/nav.js') }}"></script>

<script src="{{ url_for('static', filename='js/mypage.js') }}"></script>
</body>
</html>
